{% extends "base.html" %}

{% block title %}Backtest — Invest-Scout{% endblock %}

{% block content %}
<h1>Backtest</h1>
<p style="color:#666;margin-bottom:1.5rem">
    Simulate how the signal engine would have performed on historical data.
</p>

<div class="card">
    <h3>Run a Backtest</h3>
    <form hx-post="/api/backtest"
          hx-target="#backtest-results"
          hx-swap="innerHTML"
          hx-indicator="#bt-loading">

        <div style="display:flex;gap:1rem;flex-wrap:wrap;align-items:end">
            <div class="form-group">
                <label for="ticker">Ticker</label>
                <input type="text" id="ticker" name="ticker"
                       placeholder="e.g. AAPL" required
                       style="max-width:150px">
            </div>
            <div class="form-group">
                <label for="start_date">Start Date</label>
                <input type="date" id="start_date" name="start_date" required>
            </div>
            <div class="form-group">
                <label for="end_date">End Date</label>
                <input type="date" id="end_date" name="end_date" required>
            </div>
            <div class="form-group">
                <button type="submit" class="btn btn-primary">Run Backtest</button>
                <span id="bt-loading" class="htmx-indicator">
                    <span class="spinner"></span> Running...
                </span>
            </div>
        </div>
    </form>
</div>

<div id="backtest-results">
    {# Results are injected here by HTMX #}
</div>
{% endblock %}
